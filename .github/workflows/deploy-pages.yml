name: Enable GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write
  administration: write

jobs:
  enable-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Enable GitHub Pages from gh-pages branch
        run: |
          RESPONSE=$(curl -s -o /tmp/pages_response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"source":{"branch":"gh-pages","path":"/"}}')
          echo "HTTP Status: $RESPONSE"
          cat /tmp/pages_response.json
          if [ "$RESPONSE" = "201" ] || [ "$RESPONSE" = "409" ]; then
            echo "Pages enabled successfully (or already enabled)"
          else
            echo "Warning: Unexpected status $RESPONSE"
          fi

      - name: Print site URL
        run: echo "Site will be live at https://bassfy.github.io/infoenc/"
